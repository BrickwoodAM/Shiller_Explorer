name: Update Shiller data

on:
  schedule:
    # Shiller updates the file roughly monthly, on no fixed date, so check
    # weekly. Commits happen only when the regenerated data actually changes.
    - cron: "17 6 * * 1"   # Mondays 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "pandas>=2.0" "xlrd>=2.0.1"

      - name: Download, validate and regenerate data
        run: python scripts/update_data.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No data changes — nothing to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            LAST=$(python -c "import json;print(json.load(open('shiller_slim_v3_fixed.json'))['m']['last_updated'])")
            git commit -m "Auto-update Shiller data through ${LAST}"
            git push
          fi
